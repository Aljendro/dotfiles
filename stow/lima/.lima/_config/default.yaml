cpus: 1
memory: '4GiB'
disk: '50GiB'

portForwards:
  - guestIP: '::'
    guestPort: 323
    proto: udp
    ignore: true
  - guestIP: '::'
    guestPort: 5353
    proto: udp
    ignore: true
  - guestIP: '::'
    guestPort: 5355
    proto: any
    ignore: true
  - guestIP: '::'
    guestPort: 6010
    proto: any
    ignore: true

ssh:
  forwardX11: true

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      dnf up -y
      dnf copr enable dejan/lazygit -y
      dnf copr enable jdxcode/mise -y
      dnf install -y \
        ansible \
        awscli2 \
        bat \
        clangd \
        curl \
        fd-find \
        fzf \
        git \
        git-delta \
        jq \
        lazygit \
        lsof \
        mise \
        neovim \
        python3-pip \
        ripgrep \
        stow \
        tmux \
        tree \
        unzip \
        wget \
        xclip \
        xorg-x11-xauth
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      cd "$HOME"
      if [ ! -d dotfiles-vm ]; then
        git clone https://github.com/aljendro/dotfiles-vm.git
      fi
